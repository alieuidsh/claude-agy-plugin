name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parser-tests:
    name: parser tests (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Syntax check companion
        run: node --check plugins/agy/scripts/agy-companion.mjs
      - name: Run parser tests
        run: npm test
